# 樱 · 个人导航 — Docker Compose
# 单容器：nginx:80 静态前端 + 反代 /api → Node:3000（见 Dockerfile）
#
# 一键启动（构建并后台运行）：
#   docker compose up -d --build
# 访问：http://127.0.0.1:8080  （端口见 HOST_PORT）
# 停止：docker compose down
#
# 可选：复制 .env.example 为 .env 后修改 HOST_PORT / SAKURA_API_KEY

name: sakura-nav

services:
  sakura-nav:
    build:
      context: .
      dockerfile: Dockerfile
    image: sakura-nav:latest
    container_name: sakura-nav
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8080}:80"

    environment:
      TZ: Asia/Shanghai
      PORT: "3000"
      # 数据落在挂载卷 /data 下的子目录，避免与其它项目共用一个扁平目录
      DATA_DIR: /data/sakura-nav
      BIND_HOST: "127.0.0.1"
      SAKURA_API_KEY: ${SAKURA_API_KEY:-}

    volumes:
      # 宿主 ./data → 容器 /data（SQLite 与上传媒体持久化）
      - ./data:/data

    # === 开发热更新：取消下列 volumes 注释 ===
    # volumes:
    #   - ./:/usr/share/nginx/html:ro
    #   - ./nginx.conf.template:/docker/nginx.conf.template:ro

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m
      - /var/run:size=8m
      - /tmp:size=16m
    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

