# 樱 · 个人导航 — Docker Compose
# 单容器：nginx:80 静态前端 + 反代 /api → Node:3000（见 Dockerfile）
#
# 一键启动（构建并后台运行）：
#   docker compose up -d --build
# 访问：http://127.0.0.1:18080  （端口见 HOST_PORT）
# 停止：docker compose down
#
# 可选：复制 .env.example 为 .env 后修改 HOST_PORT / SAKURA_API_KEY

name: xianran-nav

services:
  xianran-nav:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: xianran-nav:latest
    container_name: xianran-nav
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-18080}:80"

    environment:
      TZ: Asia/Shanghai
      PORT: "3000"
      # 数据目录：默认 /data/xianran-nav。
      # 老 deploy 用的是 /data/sakura-nav；server 启动时检测到旧目录会自动 rename 过来（一次性迁移），用户数据零丢失。
      DATA_DIR: /data/xianran-nav
      BIND_HOST: "127.0.0.1"
      SAKURA_API_KEY: ${SAKURA_API_KEY:-}
      # 图床公开 URL 前缀（可选；留空则返相对路径走 nav 主域）
      APP_URL: ${APP_URL:-}

    volumes:
      # 宿主 ./data → 容器 /data（SQLite 与上传媒体持久化）
      - ./data:/data

    # === 开发热更新：取消下列 volumes 注释 ===
    # volumes:
    #   - ./:/usr/share/nginx/html:ro
    #   - ./nginx.conf.template:/docker/nginx.conf.template:ro

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # 安全加固：禁止提权
    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

