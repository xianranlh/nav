<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce8ef"/>
      <stop offset="100%" stop-color="#e3e0fa"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="720" height="480" fill="url(#bg2)" rx="16" opacity="0.55"/>

  <!-- 弹窗 -->
  <g transform="translate(160, 60)">
    <rect width="400" height="360" rx="16" fill="rgba(255,255,255,0.92)" stroke="rgba(0,0,0,0.06)" filter="url(#shadow2)"/>

    <!-- 头 -->
    <text x="20" y="32" font-size="15" font-weight="600" fill="#222">添加网址</text>
    <text x="378" y="32" text-anchor="end" font-size="18" fill="#888">×</text>

    <!-- 网址 -->
    <text x="20" y="70" font-size="11" fill="#888">网址</text>
    <rect x="20" y="78" width="360" height="32" rx="8" fill="rgba(0,0,0,0.03)" stroke="rgba(0,0,0,0.10)"/>
    <text x="32" y="98" font-size="12" fill="#bbb" font-style="italic">https://...</text>

    <!-- 名称 -->
    <text x="20" y="132" font-size="11" fill="#888">名称</text>
    <rect x="20" y="140" width="360" height="32" rx="8" fill="rgba(0,0,0,0.03)" stroke="rgba(0,0,0,0.10)"/>
    <text x="32" y="160" font-size="12" fill="#bbb" font-style="italic">留空自动用站点域名</text>

    <!-- 所属分组 -->
    <text x="20" y="194" font-size="11" fill="#888">所属分组</text>
    <rect x="20" y="202" width="240" height="32" rx="8" fill="rgba(0,0,0,0.03)" stroke="rgba(0,0,0,0.10)"/>
    <text x="32" y="222" font-size="12" fill="#666">默认 ▾</text>
    <rect x="270" y="202" width="80" height="32" rx="8" fill="#fff" stroke="rgba(0,0,0,0.10)"/>
    <text x="310" y="222" text-anchor="middle" font-size="11" fill="#7c83fa">+ 新建</text>

    <!-- 更多设置（折叠） -->
    <rect x="20" y="252" width="360" height="40" rx="11" fill="rgba(0,0,0,0.02)" stroke="rgba(0,0,0,0.06)"/>
    <text x="32" y="277" font-size="13" fill="#333">⚙ 更多设置</text>
    <text x="120" y="277" font-size="11" fill="#aaa">图标 / 描述 / 背景媒体（可选）</text>
    <text x="370" y="277" text-anchor="end" font-size="10" fill="#888">▾</text>

    <!-- 按钮 -->
    <rect x="240" y="310" width="60" height="32" rx="8" fill="#fff" stroke="rgba(0,0,0,0.10)"/>
    <text x="270" y="330" text-anchor="middle" font-size="12" fill="#666">取消</text>
    <rect x="306" y="310" width="78" height="32" rx="8" fill="#7c83fa"/>
    <text x="345" y="330" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">保存网址</text>

    <!-- 顶分隔线 -->
    <line x1="20" y1="304" x2="380" y2="304" stroke="rgba(0,0,0,0.05)"/>
  </g>

  <!-- 标注：点击后展开 → -->
  <g transform="translate(580, 295)" font-size="11" fill="#7c83fa">
    <text x="0" y="0">点击 ⚙</text>
    <text x="0" y="14">展开内嵌</text>
    <text x="0" y="28">"卡片背景媒体"</text>
    <path d="M -10 -5 L -50 -5" stroke="#7c83fa" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c83fa"/>
    </marker>
  </defs>
</svg>
